<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Dashboard | AeroCurator</title>
<meta name="description" content="AeroCurator user dashboard – view inventory and search components."/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/static/css/custom.css" rel="stylesheet"/>
<script>
tailwind.config = {
    darkMode:"class",
    theme: { extend: { colors: {
        "primary-container":"#849df2","surface-dim":"#060e20","on-primary":"#012678",
        "on-surface-variant":"#a3aac4","outline-variant":"#40485d","on-surface":"#dee5ff",
        "on-primary-container":"#001c5e","surface-container-low":"#091328",
        "surface-container-highest":"#192540","error":"#ff6e84","background":"#060e20",
        "primary":"#93aaff","surface":"#060e20","primary-dim":"#829aef",
        "surface-container":"#0f1930","surface-bright":"#1f2b49","secondary":"#e0e3e5",
        "surface-container-high":"#141f38","outline":"#6d758c"
    }}}
}
</script>
</head>
<body class="bg-surface text-on-surface">
<div id="toast-container"></div>
<!-- Sidebar Overlay (mobile) -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 z-30 md:hidden"></div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="p-5 pb-3">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 signature-gradient rounded-lg flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-[#001c5e]" style="font-variation-settings:'FILL' 1;font-size:20px">flight_takeoff</span>
      </div>
      <span class="text-base font-extrabold tracking-tighter uppercase">AeroCurator</span>
    </div>
    <p class="text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-3 px-2">Navigation</p>
    <a href="/user-dashboard" class="nav-link" data-page="dashboard"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
    <a href="/inventory" class="nav-link" data-page="inventory"><span class="material-symbols-outlined">inventory_2</span> Catalog</a>
    <a href="/orders" class="nav-link" data-page="orders"><span class="material-symbols-outlined">assignment_returned</span> Order Requests</a>
    <div class="mt-4 mb-2 px-2"><div class="border-t border-white/5"></div></div>
    <p class="text-xs font-bold tracking-widest uppercase text-on-surface-variant mb-3 px-2">Account</p>
    <a href="/profile" class="nav-link" data-page="profile"><span class="material-symbols-outlined">manage_accounts</span> My Profile</a>
  </div>
  <div class="mt-auto p-5 border-t border-white/5">
    <button id="btn-logout" class="nav-link w-full text-error hover:bg-red-900/20">
      <span class="material-symbols-outlined">logout</span> Sign Out
    </button>
  </div>
</nav>

<!-- Main -->
<div id="main-content">
  <!-- Topbar -->
  <header id="topbar">
    <div class="flex items-center gap-3">
      <button id="btn-sidebar-toggle" class="md:hidden btn-icon">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="text-lg font-bold">User Dashboard</h1>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 signature-gradient rounded-full flex items-center justify-center flex-shrink-0">
          <span class="text-[#001c5e] text-xs font-extrabold tracking-tight" id="topbar-avatar-initials">AC</span>
        </div>
        <div class="hidden sm:block">
          <p class="text-sm font-semibold leading-none" id="topbar-name">—</p>
          <p class="text-xs text-on-surface-variant leading-none mt-0.5" id="topbar-email"></p>
        </div>
        <span class="chip chip-user sm:inline-flex" id="topbar-role">user</span>
      </div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="p-8 page-fade">

    <!-- Stat Cards (Simplified) -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
      <div class="stat-card">
        <div class="stat-icon signature-gradient">
          <span class="material-symbols-outlined text-[#001c5e]" style="font-variation-settings:'FILL' 1">inventory_2</span>
        </div>
        <div class="stat-value" id="stat-items">—</div>
        <div class="stat-label">Total Components in Catalog</div>
      </div>
      <div class="stat-card border border-white/5">
         <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-primary text-3xl">search</span>
            <div>
                <p class="text-sm text-on-surface-variant">Quick Search</p>
                <input type="text" id="quick-search" placeholder="Search by name or SKU..." class="bg-transparent border-none focus:ring-0 text-on-surface p-0 w-full placeholder:text-on-surface/30">
            </div>
         </div>
      </div>
    </section>

    <!-- Content Table -->
    <div class="section-card">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-sm font-bold tracking-widest uppercase text-on-surface-variant">Available Inventory</h2>
            <a href="/inventory" class="text-xs text-primary font-bold hover:underline">Full Catalog →</a>
        </div>
        <div id="table-user-inventory">
            <div class="spinner"></div>
        </div>
    </div>

  </main>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/dashboard-base.js"></script>
<script src="/static/user-dashboard/user-dashboard.js"></script>
</body>
</html>
