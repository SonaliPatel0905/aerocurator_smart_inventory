version: '3.8'

services:
  backend:
    build: 
      context: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/aerocurator_inventory
      - JWT_SECRET=production_docker_jwt_supersecret
    depends_on:
      - mongo
    networks:
      - aerocurator-network

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - aerocurator-network

networks:
  aerocurator-network:
    driver: bridge

volumes:
  mongo-data:
